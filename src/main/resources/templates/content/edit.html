<!DOCTYPE html>
<html lang="en" xmlns:th="http://www.thymeleaf.org">
<head>
    <meta charset="UTF-8"/>
    <title>Edit Content – ContentHub</title>
    <link rel="stylesheet" th:href="@{/css/style.css}"/>
</head>
<body>
<nav class="navbar">
    <div class="nav-brand"><a th:href="@{/dashboard}">🎬 ContentHub</a></div>
    <div class="nav-links">
        <a th:href="@{/content}">← Catalog</a>
        <a th:href="@{/auth/logout}" class="btn-logout">Logout</a>
    </div>
</nav>
<div class="container">
    <div class="form-card">
        <h2>Edit Content: <span th:text="${content.title}">Title</span></h2>
        <form th:action="@{/content/{id}/edit(id=${content.id})}" method="post" th:object="${contentDTO}">
            <div class="form-group">
                <label>Title *</label>
                <input type="text" th:field="*{title}" th:value="${content.title}" required/>
            </div>
            <div class="form-group">
                <label>Description</label>
                <textarea th:field="*{description}" rows="3" th:text="${content.description}"></textarea>
            </div>
            <div class="form-row">
                <div class="form-group">
                    <label>Genre</label>
                    <input type="text" th:field="*{genre}" th:value="${content.genre}"/>
                </div>
                <div class="form-group">
                    <label>Creator *</label>
                    <input type="text" th:field="*{creator}" th:value="${content.creator}" required/>
                </div>
            </div>
            <div class="form-group">
                <label>Content Type</label>
                <select th:field="*{contentType}">
                    <option th:each="type : ${contentTypes}"
                            th:value="${type}" th:text="${type}"
                            th:selected="${type == content.contentType}">TYPE</option>
                </select>
            </div>
            <div class="form-group checkbox-group">
                <label>
                    <input type="checkbox" th:field="*{isPremium}" th:checked="${content.isPremium()}"/>
                    Premium Content
                </label>
                <label>
                    <input type="checkbox" th:field="*{available}" th:checked="${content.isAvailable()}"/>
                    Available in Catalog
                </label>
            </div>
            <div class="form-actions">
                <button type="submit" class="btn-primary">Save Changes</button>
                <a th:href="@{/content/{id}(id=${content.id})}" class="btn-secondary">Cancel</a>
            </div>
        </form>
    </div>
</div>
</body>
</html>
