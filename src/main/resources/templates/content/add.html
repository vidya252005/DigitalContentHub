<!DOCTYPE html>
<html lang="en" xmlns:th="http://www.thymeleaf.org">
<head>
    <meta charset="UTF-8"/>
    <title>Add Content – ContentHub</title>
    <link rel="stylesheet" th:href="@{/css/style.css}"/>
</head>
<body>
<nav class="navbar">
    <div class="nav-brand"><a th:href="@{/dashboard}">🎬 ContentHub</a></div>
    <div class="nav-links">
        <a th:href="@{/content}">← Catalog</a>
        <a th:href="@{/auth/logout}" class="btn-logout">Logout</a>
    </div>
</nav>
<div class="container">
    <div class="form-card" style="max-width:760px">
        <h2>Add New Content</h2>
        <form th:action="@{/content/add}" method="post" th:object="${contentDTO}">
            <div class="form-row">
                <div class="form-group">
                    <label>Title *</label>
                    <input type="text" th:field="*{title}" placeholder="Content title" required/>
                    <span class="field-error" th:if="${#fields.hasErrors('title')}" th:errors="*{title}"></span>
                </div>
                <div class="form-group">
                    <label>Content Type *</label>
                    <select th:field="*{contentType}" required>
                        <option value="">-- Select --</option>
                        <option th:each="t : ${contentTypes}" th:value="${t}" th:text="${t}">TYPE</option>
                    </select>
                </div>
            </div>
            <div class="form-group">
                <label>Description</label>
                <textarea th:field="*{description}" rows="3" placeholder="Brief description..."></textarea>
            </div>
            <div class="form-row">
                <div class="form-group">
                    <label>Genre</label>
                    <input type="text" th:field="*{genre}" placeholder="e.g. Sci-Fi, Jazz"/>
                </div>
                <div class="form-group">
                    <label>Creator / Artist *</label>
                    <input type="text" th:field="*{creator}" placeholder="Creator name" required/>
                </div>
            </div>
            <div class="form-group">
                <label>Required Subscription Plan *</label>
                <div class="plan-tier-selector">
                    <label class="tier-option">
                        <input type="radio" th:field="*{requiredPlan}" value="FREE" checked/>
                        <div class="tier-card tier-selected">
                            <div class="tier-icon">🆓</div>
                            <div class="tier-name">Free</div>
                            <div class="tier-desc">All authenticated users</div>
                        </div>
                    </label>
                    <label class="tier-option">
                        <input type="radio" th:field="*{requiredPlan}" value="MONTHLY"/>
                        <div class="tier-card">
                            <div class="tier-icon">⭐</div>
                            <div class="tier-name">Monthly+</div>
                            <div class="tier-desc">Monthly or Yearly subscribers</div>
                        </div>
                    </label>
                    <label class="tier-option">
                        <input type="radio" th:field="*{requiredPlan}" value="YEARLY"/>
                        <div class="tier-card">
                            <div class="tier-icon">💎</div>
                            <div class="tier-name">Yearly Exclusive</div>
                            <div class="tier-desc">Yearly subscribers only</div>
                        </div>
                    </label>
                </div>
            </div>
            <div class="form-actions">
                <button type="submit" class="btn-primary">Add Content</button>
                <a th:href="@{/content}" class="btn-secondary">Cancel</a>
            </div>
        </form>
    </div>
</div>
<script>
document.querySelectorAll('.tier-option input').forEach(radio => {
    radio.addEventListener('change', () => {
        document.querySelectorAll('.tier-card').forEach(c => c.classList.remove('tier-selected'));
        if (radio.checked) radio.closest('.tier-option').querySelector('.tier-card').classList.add('tier-selected');
    });
});
</script>
</body>
</html>
