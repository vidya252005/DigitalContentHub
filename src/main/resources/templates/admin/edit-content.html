<!DOCTYPE html>
<html lang="en" xmlns:th="http://www.thymeleaf.org">
<head>
    <meta charset="UTF-8"/>
    <title>Edit Content – ContentHub Admin</title>
    <link rel="stylesheet" th:href="@{/css/style.css}"/>
</head>
<body>
<nav class="navbar">
    <div class="nav-brand"><a th:href="@{/admin}">🎬 ContentHub Admin</a></div>
    <div class="nav-links">
        <a th:href="@{/admin/content}">← Content</a>
        <a th:href="@{/auth/logout}" class="btn-logout">Logout</a>
    </div>
</nav>
<div class="container">
    <div class="form-card" style="max-width:800px">
        <h2>Edit: <span th:text="${content.title}">Title</span></h2>

        <form th:action="@{/admin/content/{id}/edit(id=${content.id})}" method="post" th:object="${contentDTO}">
            <div class="form-row">
                <div class="form-group">
                    <label>Title *</label>
                    <input type="text" th:field="*{title}" th:value="${content.title}" required/>
                </div>
                <div class="form-group">
                    <label>Content Type</label>
                    <select th:field="*{contentType}">
                        <option th:each="t : ${contentTypes}"
                                th:value="${t}" th:text="${t}"
                                th:selected="${t == content.contentType}">TYPE</option>
                    </select>
                </div>
            </div>
            <div class="form-group">
                <label>Description</label>
                <textarea th:field="*{description}" rows="3" th:text="${content.description}"></textarea>
            </div>
            <div class="form-row">
                <div class="form-group">
                    <label>Genre</label>
                    <input type="text" th:field="*{genre}" th:value="${content.genre}"/>
                </div>
                <div class="form-group">
                    <label>Creator *</label>
                    <input type="text" th:field="*{creator}" th:value="${content.creator}" required/>
                </div>
            </div>

            <!-- Plan tier -->
            <div class="form-group">
                <label>Required Subscription Plan</label>
                <div class="plan-tier-selector">
                    <label class="tier-option">
                        <input type="radio" th:field="*{requiredPlan}" value="FREE"
                               th:checked="${content.requiredPlan.name() == 'FREE'}"/>
                        <div class="tier-card" th:classappend="${content.requiredPlan.name() == 'FREE'} ? 'tier-selected':''">
                            <div class="tier-icon">🆓</div>
                            <div class="tier-name">Free</div>
                            <div class="tier-desc">All users</div>
                        </div>
                    </label>
                    <label class="tier-option">
                        <input type="radio" th:field="*{requiredPlan}" value="MONTHLY"
                               th:checked="${content.requiredPlan.name() == 'MONTHLY'}"/>
                        <div class="tier-card" th:classappend="${content.requiredPlan.name() == 'MONTHLY'} ? 'tier-selected':''">
                            <div class="tier-icon">⭐</div>
                            <div class="tier-name">Monthly+</div>
                            <div class="tier-desc">Monthly or Yearly</div>
                        </div>
                    </label>
                    <label class="tier-option">
                        <input type="radio" th:field="*{requiredPlan}" value="YEARLY"
                               th:checked="${content.requiredPlan.name() == 'YEARLY'}"/>
                        <div class="tier-card" th:classappend="${content.requiredPlan.name() == 'YEARLY'} ? 'tier-selected':''">
                            <div class="tier-icon">💎</div>
                            <div class="tier-name">Yearly Exclusive</div>
                            <div class="tier-desc">Yearly plan only</div>
                        </div>
                    </label>
                </div>
            </div>

            <div class="form-group checkbox-group">
                <label>
                    <input type="checkbox" th:field="*{available}" th:checked="${content.isAvailable()}"/>
                    Visible in catalog (uncheck to hide)
                </label>
            </div>

            <div class="form-actions">
                <button type="submit" class="btn-primary">Save Changes</button>
                <a th:href="@{/admin/content}" class="btn-secondary">Cancel</a>
            </div>
        </form>
    </div>
</div>
<script>
document.querySelectorAll('.tier-option input').forEach(radio => {
    radio.addEventListener('change', () => {
        document.querySelectorAll('.tier-card').forEach(c => c.classList.remove('tier-selected'));
        if (radio.checked) radio.closest('.tier-option').querySelector('.tier-card').classList.add('tier-selected');
    });
});
</script>
</body>
</html>
