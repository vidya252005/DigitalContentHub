<!DOCTYPE html>
<html lang="en" xmlns:th="http://www.thymeleaf.org">
<head>
    <meta charset="UTF-8"/>
    <title>Add Curator – ContentHub Admin</title>
    <link rel="stylesheet" th:href="@{/css/style.css}"/>
</head>
<body>
<nav class="navbar">
    <div class="nav-brand"><a th:href="@{/dashboard}">🎬 ContentHub</a></div>
    <div class="nav-links">
        <a th:href="@{/admin}">Admin Dashboard</a>
        <a th:href="@{/auth/logout}" class="btn-logout">Logout</a>
    </div>
</nav>
<div class="container">
    <div class="form-card">
        <h2>Add New Content Curator</h2>
        <p>Curators can manage the content catalog, add new assets, and monitor trends.</p>

        <form th:action="@{/admin/curators/add}" method="post" th:object="${registerDTO}">
            <div class="form-group">
                <label>Username *</label>
                <input type="text" th:field="*{username}" placeholder="Curator username" required/>
                <span class="field-error" th:if="${#fields.hasErrors('username')}" th:errors="*{username}"></span>
            </div>
            <div class="form-group">
                <label>Email *</label>
                <input type="email" th:field="*{email}" placeholder="curator@contenthub.com" required/>
                <span class="field-error" th:if="${#fields.hasErrors('email')}" th:errors="*{email}"></span>
            </div>
            <div class="form-group">
                <label>Password *</label>
                <input type="password" th:field="*{password}" placeholder="Min 6 characters" required/>
            </div>
            <div class="form-group">
                <label>Confirm Password *</label>
                <input type="password" th:field="*{confirmPassword}" placeholder="Repeat password" required/>
            </div>
            <div class="form-actions">
                <button type="submit" class="btn-primary">Create Curator Account</button>
                <a th:href="@{/admin}" class="btn-secondary">Cancel</a>
            </div>
        </form>
    </div>
</div>
</body>
</html>
