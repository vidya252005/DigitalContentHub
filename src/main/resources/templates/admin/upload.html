<!DOCTYPE html>
<html lang="en" xmlns:th="http://www.thymeleaf.org">
<head>
    <meta charset="UTF-8"/>
    <title>Upload Content – ContentHub Admin</title>
    <link rel="stylesheet" th:href="@{/css/style.css}"/>
</head>
<body>
<nav class="navbar">
    <div class="nav-brand"><a th:href="@{/admin}">🎬 ContentHub Admin</a></div>
    <div class="nav-links">
        <a th:href="@{/admin}">Dashboard</a>
        <a th:href="@{/admin/content}">← Content</a>
        <a th:href="@{/auth/logout}" class="btn-logout">Logout</a>
    </div>
</nav>
<div class="container">
    <div class="form-card" style="max-width:800px">
        <h2>Upload New Content</h2>
        <p style="color:#888;margin-bottom:1.5rem">Add a new movie, music track, or eBook to the platform.</p>

        <form th:action="@{/admin/content/upload}" method="post" th:object="${contentDTO}">

            <div class="form-row">
                <div class="form-group">
                    <label>Title *</label>
                    <input type="text" th:field="*{title}" placeholder="Content title" required/>
                    <span class="field-error" th:if="${#fields.hasErrors('title')}" th:errors="*{title}"></span>
                </div>
                <div class="form-group">
                    <label>Content Type *</label>
                    <select th:field="*{contentType}" required>
                        <option value="">-- Select Type --</option>
                        <option th:each="t : ${contentTypes}" th:value="${t}" th:text="${t}">TYPE</option>
                    </select>
                </div>
            </div>

            <div class="form-group">
                <label>Description</label>
                <textarea th:field="*{description}" rows="3" placeholder="Brief description of this content..."></textarea>
            </div>

            <div class="form-row">
                <div class="form-group">
                    <label>Genre</label>
                    <input type="text" th:field="*{genre}" placeholder="e.g. Sci-Fi, Jazz, Technology"/>
                </div>
                <div class="form-group">
                    <label>Creator / Artist *</label>
                    <input type="text" th:field="*{creator}" placeholder="Creator or studio name" required/>
                </div>
            </div>

            <div class="form-row">
                <div class="form-group">
                    <label>File URL</label>
                    <input type="text" th:field="*{fileUrl}" placeholder="/content/files/movie.mp4"/>
                    <small style="color:#666">Path to the content file on the server</small>
                </div>
                <div class="form-group">
                    <label>Thumbnail URL</label>
                    <input type="text" th:field="*{thumbnailUrl}" placeholder="/content/thumbs/cover.jpg"/>
                </div>
            </div>

            <!-- Plan tier selector – visually prominent -->
            <div class="form-group">
                <label>Required Subscription Plan *</label>
                <div class="plan-tier-selector">
                    <label class="tier-option" id="tier-free">
                        <input type="radio" th:field="*{requiredPlan}" value="FREE" checked/>
                        <div class="tier-card">
                            <div class="tier-icon">🆓</div>
                            <div class="tier-name">Free</div>
                            <div class="tier-desc">Accessible to all users, no subscription needed</div>
                        </div>
                    </label>
                    <label class="tier-option" id="tier-monthly">
                        <input type="radio" th:field="*{requiredPlan}" value="MONTHLY"/>
                        <div class="tier-card">
                            <div class="tier-icon">⭐</div>
                            <div class="tier-name">Monthly+</div>
                            <div class="tier-desc">Requires Monthly or Yearly subscription</div>
                        </div>
                    </label>
                    <label class="tier-option" id="tier-yearly">
                        <input type="radio" th:field="*{requiredPlan}" value="YEARLY"/>
                        <div class="tier-card">
                            <div class="tier-icon">💎</div>
                            <div class="tier-name">Yearly Exclusive</div>
                            <div class="tier-desc">Only accessible to Yearly plan subscribers</div>
                        </div>
                    </label>
                </div>
            </div>

            <div class="form-actions">
                <button type="submit" class="btn-primary">Upload Content</button>
                <a th:href="@{/admin/content}" class="btn-secondary">Cancel</a>
            </div>
        </form>
    </div>
</div>
<script>
// Highlight the selected tier card
document.querySelectorAll('.tier-option input').forEach(radio => {
    radio.addEventListener('change', () => {
        document.querySelectorAll('.tier-card').forEach(c => c.classList.remove('tier-selected'));
        if (radio.checked) radio.closest('.tier-option').querySelector('.tier-card').classList.add('tier-selected');
    });
});
// Init
document.querySelector('.tier-option input:checked')
    ?.closest('.tier-option')?.querySelector('.tier-card')?.classList.add('tier-selected');
</script>
</body>
</html>
