# ============================================
# Subscription-Based Digital Content Hub
# Application Configuration
# ============================================

# Server
server.port=8080
spring.application.name=digital-content-hub

# H2 In-Memory Database
spring.datasource.url=jdbc:h2:mem:contentdb;DB_CLOSE_DELAY=-1;DB_CLOSE_ON_EXIT=FALSE;NON_KEYWORDS=VALUE
spring.datasource.driver-class-name=org.h2.Driver
spring.datasource.username=sa
spring.datasource.password=password
spring.jpa.database-platform=org.hibernate.dialect.H2Dialect

# JPA / Hibernate
# create-drop: tables are created on startup, dropped on shutdown
spring.jpa.hibernate.ddl-auto=create-drop
spring.jpa.show-sql=true
spring.jpa.properties.hibernate.format_sql=false

# CRITICAL: defer-datasource-initialization=true makes Hibernate create
# the schema FIRST, then data.sql runs AFTER. Without this, data.sql
# runs before tables exist.
spring.jpa.defer-datasource-initialization=true
spring.sql.init.mode=always

# H2 Console (http://localhost:8080/h2-console)
# JDBC URL to use in console: jdbc:h2:mem:contentdb
spring.h2.console.enabled=true
spring.h2.console.path=/h2-console
spring.h2.console.settings.web-allow-others=false

# Thymeleaf
spring.thymeleaf.cache=false
spring.thymeleaf.enabled=true
spring.thymeleaf.prefix=classpath:/templates/
spring.thymeleaf.suffix=.html

# Logging
logging.level.com.contentHub=DEBUG
logging.level.org.springframework.security=INFO
logging.level.org.springframework.jdbc=DEBUG

# File Upload
spring.servlet.multipart.max-file-size=50MB
spring.servlet.multipart.max-request-size=50MB
